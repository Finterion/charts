name: CI
on:
  push: { branches: [main] }
  pull_request:

jobs:
  build:
    name: TS build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm size

  python:
    name: Python ${{ matrix.python-version }} test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: bindings/python/pyproject.toml

      # The Python tests don't exercise the embed bundle directly, but the
      # package import path checks for it — build it once so the wheel
      # layout matches what users get from PyPI.
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @finterion/charts-embed-app build

      - name: Install Python binding (with dev extras)
        working-directory: bindings/python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        working-directory: bindings/python
        run: pytest -x -q

  python-build:
    name: Python wheel smoke build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @finterion/charts-embed-app build
      - run: python -m pip install --upgrade pip build
      - name: Build sdist + wheel
        working-directory: bindings/python
        run: python -m build
      - name: Verify wheel ships embed.html
        working-directory: bindings/python
        run: |
          set -euo pipefail
          WHEEL=$(ls dist/*.whl | head -n1)
          python -m zipfile -l "$WHEEL" | grep -q "finterion_charts/_static/embed.html" \
            || { echo "::error::embed.html not packaged"; exit 1; }
